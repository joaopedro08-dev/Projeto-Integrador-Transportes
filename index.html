<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO básico -->
    <meta name="description" content="Compare e encontre transportes para qualquer momento, com base na sua localização.">
    <meta name="author" content="Time E.L.I.T.E - UniFio (Centro Universitário das Faculdades Integradas de Ourinhos)">
    <meta name="keywords" content="transporte, ônibus, mobilidade urbana, universidade">

    <!-- Open Graph (compartilhamento em redes sociais) -->
    <meta property="og:title" content="Projeto Integrador">
    <meta property="og:description" content="Planeje seu destino com os transportes disponíveis.">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="public/favicon.ico">

    <title>Projeto Integrador</title>

    <!-- CSS -->
    <link rel="stylesheet" href="src/style/style.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body>
    <!-- Controle de tema (CSS-only) -->
    <input type="checkbox" id="theme-toggle" class="theme-toggle-input" aria-label="Ativar modo escuro">

    <!-- Estrutura principal da página -->
    <div class="site-shell">
        <!-- Header / Navegação -->
        <header class="site-header">
            <div class="container header-content">
                <a href="/" class="logo" aria-label="Página inicial">Logo</a>

                <nav class="main-nav" aria-label="Navegação principal">
                    <ul>
                        <li><a href="#inicio">Início</a></li>
                        <li><a href="#sobre">Sobre</a></li>
                        <li><a href="#transportes">Transportes</a></li>
                        <li><a href="#serviços">Serviços</a></li>
                        <li><a href="#ajuda">Ajuda</a></li>
                    </ul>
                </nav>

                <label class="theme-button" for="theme-toggle" aria-label="Alternar tema">
                    <span class="material-symbols-outlined icon-dark">dark_mode</span>
                    <span class="material-symbols-outlined icon-light">light_mode</span>
                </label>
            </div>
        </header>

        <!-- Conteúdo principal -->
        <main>
            <!-- Hero section -->
            <section id="inicio" class="hero">
                <div class="container hero-content">
                    <!-- Elemento visual decorativo (ônibus) -->
                    <img src="src/assets/img/bus-blue.png" alt="Ilustração de ônibus" class="hero-bus">

                    <!-- Bloco principal de texto e ações -->
                    <div class="hero-text">
                        <span class="hero-badge">
                            <span class="material-symbols-outlined hero-icon">directions_bus</span>
                            Transporte inteligente
                        </span>
                        <h1>Planeje seu destino com os transportes disponíveis</h1>
                        <p>Compare e encontre transportes para qualquer momento, com base na sua localização.</p>

                        <div class="hero-actions">
                            <a href="#" class="btn btn-primary">
                                <span class="material-symbols-outlined hero-icon">location_on</span>
                                Localize
                            </a>
                            <a href="#" class="btn btn-secondary">
                                <span class="material-symbols-outlined hero-icon">login</span>
                                Entrar
                            </a>
                        </div>
                    </div>

                    <!-- Elemento visual decorativo (mapa) -->
                    <img src="src/assets/img/map.png" alt="Ícone de localização" class="hero-map">
                </div>
            </section>
        </main>
    </div>
</body>
</html>
